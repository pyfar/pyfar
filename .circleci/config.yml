# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/2.0/configuration-reference
version: 2.1

# Orbs are reusable packages of CircleCI configuration that you may share across projects, enabling you to create encapsulated, parameterized commands, jobs, and executors that can be used across multiple projects.
# See: https://circleci.com/docs/2.0/orb-intro/
orbs:
  # The python orb contains a set of prepackaged CircleCI configuration you can use repeatedly in your configuration files
  # Orb commands and jobs help you with common scripting around a language/tool
  # so you dont have to copy and paste it everywhere.
  # See the orb documentation here: https://circleci.com/developer/orbs/orb/circleci/python
  python: circleci/python@1.2


executors:
  python-docker: # declares a reusable executor
    parameters:
      version:
        description: "version tag"
        default: "latest"
        type: string
    docker:
      - image: cimg/python:<<parameters.version>>

# Define a job to be invoked later in a workflow.
# See: https://circleci.com/docs/2.0/configuration-reference/#jobs
jobs:
  build_distribution:
    parameters:
      version:
        description: "version tag"
        default: "latest"
        type: string
    executor:
      name: python-docker
      version: <<parameters.version>>
    steps:
      - checkout
      - run:
          name: install build dependencies
          command: pip install ".[deploy]"
      - run:
          name: Build distribution artifacts
          command: |
            python -m build
      - persist_to_workspace:
          root: .
          paths:
            - dist

  test_source:
    parameters:
      version:
        description: "version tag"
        default: "latest"
        type: string
    executor:
      name: python-docker
      version: <<parameters.version>>
    steps:
      - checkout
      - run:
          name: Install System Dependencies
          command: sudo apt-get update && sudo apt-get install -y libsndfile1      
      - run:
          name: install dependencies
          command: pip install ".[tests]"
      - run:
          name: Run tests
          command: pytest tests

  test_wheel:
    parameters:
      version:
        description: "version tag"
        default: "latest"
        type: string
    executor:
      name: python-docker
      version: <<parameters.version>>
    steps:
      - checkout
      - attach_workspace:
          at: /tmp/workspace
      - run:
          name: Install wheel from workspace in isolated venv
          command: |
            rm -rf /tmp/wheeltest
            python -m venv /tmp/wheeltest
            # Find the wheel file in the workspace and save it to an environment variable
            WHEEL=$(ls -1 /tmp/workspace/dist/*.whl | head -n 1)
            /tmp/wheeltest/bin/python -m pip install "${WHEEL}[tests]"
      - run:
          name: Move test files to isolated location
          command: |
            rm -rf /tmp/spharpy-wheel-tests
            mkdir -p /tmp/spharpy-wheel-tests
            cp -r tests /tmp/spharpy-wheel-tests/
      - run:
          name: Run tests against wheel installation (i.e. in isolated environment)
          command: |
            cd /tmp/spharpy-wheel-tests
            /tmp/wheeltest/bin/python -m pytest tests

  ruff:
    parameters:
      version:
        description: "version tag"
        default: "latest"
        type: string
    executor:
      name: python-docker
      version: <<parameters.version>>
    steps:
      - checkout
      - run:
          name: install dependencies
          command: pip install ".[tests]"
      - run:
          name: Ruff
          command: ruff check

  test_documentation_build:
    parameters:
      version:
        description: "version tag"
        default: "latest"
        type: string
    executor:
      name: python-docker
      version: <<parameters.version>>
    steps:
      - checkout
      - run:
          name: Install System Dependencies
          command: sudo apt-get update && sudo apt-get install -y libsndfile1
      - run:
          name: Sphinx
          command: |
            pip install ".[docs]"
            cd docs/
            make html SPHINXOPTS="-W"

  test_deprecation_warnings:
    parameters:
      version:
        description: "version tag"
        default: "latest"
        type: string
    executor:
      name: python-docker
      version: <<parameters.version>>
    steps:
      - checkout
      - run:
          name: Install System Dependencies
          command: sudo apt-get update && sudo apt-get install -y libsndfile1
      - run:
          name: install dependencies
          command: pip install ".[tests]"
      - run: |
          python --version
      - run:
          name: Run tests
          command: pytest tests -W error::DeprecationWarning

  test_package_build:
    parameters:
      version:
        description: "version tag"
        default: "latest"
        type: string
    executor:
      name: python-docker
      version: <<parameters.version>>
    steps:
      - checkout
      - attach_workspace:
          at: /tmp/workspace
      - run:
          name: Install System Dependencies
          command: sudo apt-get update && sudo apt-get install -y libsndfile1
      - run:
          name: install dependencies
          command: pip install ".[deploy]"
      - run:
          name: deploy
          command: |
            twine check /tmp/workspace/dist/*

  run_pypi_publish:
    parameters:
      version:
        description: "version tag"
        default: "latest"
        type: string
    executor:
      name: python-docker
      version: <<parameters.version>>
    steps:
      - checkout
      - attach_workspace:
          at: /tmp/workspace
      - run:
          name: Install System Dependencies
          command: sudo apt-get update && sudo apt-get install -y libsndfile1
      - run:
          name: install dependencies
          command: pip install ".[deploy]"
      - run:
          name: deploy
          command: |
            twine check /tmp/workspace/dist/*
            twine upload /tmp/workspace/dist/*


# Invoke jobs via workflows
# See: https://circleci.com/docs/2.0/configuration-reference/#workflows
workflows:
  test: # Test workflow
    jobs:
      # Run tests for all python versions
      - test_source:
          matrix:
            parameters:
              version:
                - "3.11"
                - "3.12"
                - "3.13"
                - "3.14"

      - build_distribution:
          matrix:
            parameters:
              version:
                - "3.14"
            requires:
              - test_source

      - ruff:
          matrix:
            parameters:
              version:
                - "3.14"
          requires:
            - test_source

      - test_wheel:
          matrix:
            parameters:
              version:
                - "3.11"
                - "3.12"
                - "3.13"
                - "3.14"
          requires:
            - build_distribution

      - test_documentation_build:
          matrix:
            parameters:
              version:
                - "3.14"
          requires:
            - test_source

      - test_deprecation_warnings:
          matrix:
            parameters:
              version:
                - "3.14"
          requires:
            - test_source

      - test_package_build:
          matrix:
            parameters:
              version:
                - "3.14"
          requires:
            - test_source
            - build_distribution
          filters:
            branches:
              only:
                - main
                - develop


  test_and_publish:
    # Test and publish on new git version tags
    # This requires its own workflow to successfully trigger the test and build
    jobs:
      - test_source:
          matrix:
            parameters:
              version:
                - "3.11"
                - "3.12"
                - "3.13"
                - "3.14"
          filters:
            branches:
              ignore: /.*/
            # only act on version tags
            tags:
              only: /^v[0-9]+(\.[0-9]+)*$/

      - build_distribution:
          matrix:
            parameters:
              version:
                - "3.14"
          requires:
            - test_source
          filters:
            branches:
              ignore: /.*/
            # only act on version tags
            tags:
              only: /^v[0-9]+(\.[0-9]+)*$/

      - ruff:
          matrix:
            parameters:
              version:
                - "3.14"
          requires:
            - test_source
          filters:
            branches:
              ignore: /.*/
            # only act on version tags
            tags:
              only: /^v[0-9]+(\.[0-9]+)*$/

      - test_wheel:
          matrix:
            parameters:
              version:
                - "3.11"
                - "3.12"
                - "3.13"
                - "3.14"
          requires:
            - test_source
            - build_distribution
          filters:
            branches:
              ignore: /.*/
            # only act on version tags
            tags:
              only: /^v[0-9]+(\.[0-9]+)*$/

      - test_documentation_build:
          matrix:
            parameters:
              version:
                - "3.14"
          requires:
            - test_source
          filters:
            branches:
              ignore: /.*/
            # only act on version tags
            tags:
              only: /^v[0-9]+(\.[0-9]+)*$/

      - test_deprecation_warnings:
          matrix:
            parameters:
              version:
                - "3.14"
          requires:
            - test_source
          filters:
            branches:
              ignore: /.*/
            # only act on version tags
            tags:
              only: /^v[0-9]+(\.[0-9]+)*$/

      - run_pypi_publish:
          matrix:
            parameters:
              version:
                - "3.14"
          requires:
            - test_source
            - test_wheel
            - build_distribution
            - ruff
            - test_documentation_build
            - test_deprecation_warnings
          filters:
            branches:
              ignore: /.*/
            # only act on version tags
            tags:
              only: /^v[0-9]+(\.[0-9]+)*$/

