name : add_to_project

on :
  pull_request:
    types:
      - opened
  issues:
    types:
      - opened

jobs:
  add-to-project:
    name: Add issue or pull request to project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/orgs/pyfar/projects/3
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
